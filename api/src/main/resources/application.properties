spring.application.name=ponto

spring.datasource.url=jdbc:postgresql://localhost:5432/ponto_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# JWT
app.security.jwt.segredo=${JWT_SEGREDO:UmaChaveSecretaMuitoLongaComNoMinimo256BitsParaHMACSHA256!@#2026AbCdEf}
app.security.jwt.expiracao-access-token=900000
app.security.jwt.expiracao-refresh-token=604800000

# Cookie (false para dev local sem HTTPS, true em produção com HTTPS)
app.security.cookie.seguro=${APP_SECURITY_COOKIE_SEGURO:false}

# Bot API Key (used by Discord bot for internal endpoints)
app.bot.api-key=${BOT_API_KEY:change-me-in-production}

# Discord OAuth
app.discord.client-id=${DISCORD_CLIENT_ID:}
app.discord.client-secret=${DISCORD_CLIENT_SECRET:}
app.discord.redirect-uri=${DISCORD_REDIRECT_URI:http://localhost:4200/auth/discord/callback}
app.discord.guild-id=${DISCORD_GUILD_ID:708895475020857386}
app.discord.rh-role-id=${DISCORD_RH_ROLE_ID:1490528626217586929}
