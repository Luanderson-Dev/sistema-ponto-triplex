spring.application.name=ponto

spring.datasource.url=jdbc:postgresql://localhost:5432/ponto_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

app.security.pepper=${SECURITY_PEPPER:MinhaPimentaSecretaMuitoComplexa!@#2026}

# JWT
app.security.jwt.segredo=${JWT_SEGREDO:UmaChaveSecretaMuitoLongaComNoMinimo256BitsParaHMACSHA256!@#2026AbCdEf}
app.security.jwt.expiracao-access-token=900000
app.security.jwt.expiracao-refresh-token=604800000

# Cookie (false para dev local sem HTTPS)
app.security.cookie.seguro=false
